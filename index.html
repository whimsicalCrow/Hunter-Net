<!DOCTYPE html>
<html>
  <head>

    <style>
.container {
	height: 500px;
	position: relative;
	border: none;
}

.center {
	margin: 0;
	position: absolute;
	top: 50%;
	left: 50%;
	-ms-transform: translate(-50%, -50%);
	transform: translate(-50%, -50%);
}

#footer {
  position: fixed;
  padding: 10px 10px 10px 10px;
  bottom: 0;
  width: 100%;
  /* Height of the footer*/
  height: 40px;
  text-align:center;
  color:white;
  
  }
  
  /*Loader*/
  #loader{
	position: fixed;
	width: 100%;
	height: 100vh;
	background: #21242d url('loading.gif') no-repeat center;
	background-size: 500px;
	z-index: 999;
}

  </style>
  </head>
  <body bgcolor="black">
  
  <div id="loader"></div>
    <div id="content">
    
  <div class="container">
  <div class = "center">
  <p style="color:#808080;text-align:center">
    <strong><font face = "Arial">NOT SAFE YET -- THEY'RE WATCHING</font></strong>
  </p>
  

  <div>  
    <input type="password" id="password" name="password">
 </div>
 <input type="submit" value="Submit" onclick="checkPassword()">
     <script>
       function checkPassword(){
       if(document.getElementById('password').value == 'reckoning'){
          location.href = "main.html";
         } else {
         alert('You do not belong here.');
          return false;
        }
       }
      </script>

  </div>
  
  <div id="footer"> Password Hint: What Do We Fight For?</div>
      <img src="images/darkpack_logo2.png" alt="copyright" style="width:2.5%; margin-right: 0;" >
  
  </div>
  </div>
  <script>
  var loader;

function loadNow(opacity) {
    if (opacity <= 0) {
        displayContent();
    } else {
        loader.style.opacity = opacity;
        window.setTimeout(function() {
            loadNow(opacity - 0.05);
        }, 50);
    }
}

function displayContent() {
    loader.style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

document.addEventListener("DOMContentLoaded", function() {
    loader = document.getElementById('loader');
    loadNow(1);
});
</script>
  </body>
