    <style>
    

.container {
	height: 500px;
	position: relative;
	border: none;
}

.center {
	margin: 0;
	position: absolute;
	top: 50%;
	left: 50%;
	-ms-transform: translate(-50%, -50%);
	transform: translate(-50%, -50%);
}
.box1 {
    background-color: #e4e4e4;
    background-image: url('texture.png');
    color: #fff;
    opacity: 0.8;
}

img {
  display: block;
  margin-left: auto;
  margin-right: auto;
  filter:saturate(1.4)
}

/* Add a black background color to the top navigation */
.topnav {
  background-color: #333;
  overflow: hidden;
}

/* Style the links inside the navigation bar */
.topnav a {
  float: left;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
  background-color: inherit;
  font-family: inherit; /* Important for vertical align on mobile phones */
  margin: 0; /* Important for vertical align on mobile phones */
}

/* Change the color of links on hover */
.topnav a:hover {
  background-color: #a15513;
  color: black;
}

/* Add a color to the active/current link */
.topnav a.active {
  background-color: #8B4000;
  color: white;
}

/* The dropdown container */
.dropdown {
  float: left;
  overflow: hidden;
}

/* Dropdown button */
.dropdown .dropbtn {
  font-size: 17px;
  border: none;
  outline: none;
  color: white;
  padding: 14px 16px;
  background-color: inherit;
  font-family: inherit; /* Important for vertical align on mobile phones */
  margin: 0; /* Important for vertical align on mobile phones */
}

/* Add a red background color to navbar links on hover */
.navbar a:hover, .dropdown:hover .dropbtn {
  background-color: #a15513;
}

/* Dropdown content (hidden by default) */
.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f9f9f9;
  min-width: 160px;
  padding: 8px 8px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
  border:1px solid black;
}

/* Links inside the dropdown */
.dropdown-content a {
  float: none;
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  text-align: left;
}

/* Add a grey background color to dropdown links on hover */
.dropdown-content a:hover {
  background-color: #ddd;
}

/* Show the dropdown menu on hover */
.dropdown:hover .dropdown-content {
  display: block;
}

.row {
  display: flex;
}

.column {
  flex: 33.33%;
  padding: 5px;
}

/* Contains the columns */
.row{
  margin-left:-20px;
  margin-bottom:$20px;
  *zoom:1;
}
.row:before,
.row:after{
  content:"";
  display:table;
}
.row:after{
  clear:both;
}

.div{

float: left;

}

/* Base Column */
.col{
  float:left;
  margin-bottom:0!important;
  padding-left:20px
  position:relative;
  width:100%;
}

/* Size the columns in the row */
.col-90 {width:90%}
.col-80 {width:80%}
.col-75 {width:75%}
.col-66 {width:66.6666%}
.col-60 {width:60%}
.col-50 {width:50%}
.col-40 {width:40%}
.col-30 {width:30%}
.col-25 {width:25%}
.col-20 {width:20%}
.col-10 {width:10%} 

p.dotted {border-style: dotted;}
p.dashed {border-style: dashed;}
p.solid {border-style: solid;}
p.double {border-style: double;}
p.groove {border-style: groove;}
p.ridge {border-style: ridge;}
p.inset {border-style: inset;}
p.outset {border-style: outset;}
p.none {border-style: none;}
p.hidden {border-style: hidden;}
p.mix {border-style: dotted dashed solid double;}

/*Scrollbar*/
{
Overflow-y:scroll; //add vertical bar option in html
}

  /*Loader*/
  #loader{
	position: fixed;
	width: 100%;
	height: 100vh;
	background: #21242d url('https://hunternet.neocities.org/loading.gif') no-repeat center;
	background-size: 500px;
	z-index: 999;
}

  <!--for signup form-->
    .signup-form {
      max-width: 400px;
      margin: 0 auto;
    }
    
    .signup-formlabel {
      margin-top: 5px;
      display: block;
      margin-bottom: 10px;
      color: white;
    }
    
    .signup-form input[type="text"],
    .signup-form input[type="email"],
    .signup-form input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    
    .signup-form input[type="submit"] {
      background-color: #8B4000;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .signup-form input[type="submit"]:hover {
      background-color: #a15513;
    }
    
    .signup-form h2 {
      margin-top: 0; /* Remove top margin */
      
    }

  <script>
  var loader;

function loadNow(opacity) {
    if (opacity <= 0) {
        displayContent();
    } else {
        loader.style.opacity = opacity;
        window.setTimeout(function() {
            loadNow(opacity - 0.05);
        }, 50);
    }
}

function displayContent() {
    loader.style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

document.addEventListener("DOMContentLoaded", function() {
    loader = document.getElementById('loader');
    document.getElementById('signup-form').addEventListener('submit', function(event) {
        event.preventDefault();
        document.getElementById('signup-message').style.display = 'block';
    });
    loadNow(1);
});
</script>
