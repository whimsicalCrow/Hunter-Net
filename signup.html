  </head>
<body>

<div id="loader"></div>
    <div id="content">
    
  <div class="container">
   <div class="box box1">
  
  <div class="row">
  <div class="column">
    <img src="assets/images/left1.png" alt="Left" class="header-side-img">
  </div>
  <div class="column">
    <img src="assets/images/titlealt2.png" alt="Titlealt2" class="header-title-img">
  </div>
  <div class="column">
    <img src="assets/images/right1.png" alt="Right" class="header-side-img">
  </div>
</div> 
   </div>
  
  <div class="topnav">
  
  <!--Login-->
  <div class="dropdown">
    <button class="dropbtn">Login
      <i class="fa fa-caret-down"></i>
    </button>
    <div class="dropdown-content">
      <label class="margin-bottom-5">Username: </label><br>
       <input class="margin-bottom-5" type="text" placeholder="username"><br>
       <label class="margin-bottom-5">Password: </label><br>
       <input class="margin-bottom-5" type="password" placeholder="password"><br>
       <input class="margin-bottom-5" type="submit" value="Connect"/>
       <button class="margin-bottom-5" onclick="redirectToWebsite()">Sign Up</button>
       
      <script>
      function redirectToWebsite() {
      window.open("https://hunternet.neocities.org/signup", "_blank");
      }
      </script>
      
    </div>
  </div>
  
  <a href="https://hunternet.neocities.org/main">Home</a>
  
  <div class="dropdown">
    <button class="dropbtn">Archives
      <i class="fa fa-caret-down"></i>
    </button>
    <div class="dropdown-content">
      <a href="https://hunternet.neocities.org/monsters.html">The Quarry</a>
    </div>
  </div>
  
  <div class="dropdown">
    <button class="dropbtn">Resources
      <i class="fa fa-caret-down"></i>
    </button>
    <div class="dropdown-content">
      <a href="https://hunternet.neocities.org/sheet.html">Character Sheet</a>
      <a href="https://hunternet.neocities.org/quickplay">Quick-Play Rules</a>
    </div>
  </div>
  
  <a href="https://hunternet.neocities.org/contact.html">Contact</a>
  
  <a href="https://hunternet.neocities.org/credits">Credits</a> 
  
    <img src="assets/images/darkpack_logo2.png" alt="copyright" class="darkpack-logo">


  </div>

<div class="signup-form">  
<center>
<table class="signup-table">
<tr>
<td class="signup-table-cell">
<div class="text-left">
<blockquote class="dashed-panel">
   <h2 class="signup-heading">Sign Up</h2>
  
  <form id="signup-form">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>
    
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>
    
    <button id="signup-button" type="button">Sign Up</button>
  </form>
  <p id="signup-message" role="status" aria-live="polite" class="signup-message"></p>
</blockquote>
<br>

<br>
<br>
</div>
</td>
</tr>
</table>
</center>
</div>


          <img src="assets/images/unity.png" alt="Bottom" class="unity-standard">
</div>
</div>
  <script>
  var loader;

function loadNow(opacity) {
    if (opacity <= 0) {
        displayContent();
    } else {
        loader.style.opacity = opacity;
        window.setTimeout(function() {
            loadNow(opacity - 0.05);
        }, 50);
    }
}

function displayContent() {
    loader.style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

document.addEventListener("DOMContentLoaded", function() {
    loader = document.getElementById('loader');
    const signupForm = document.getElementById('signup-form');
    const signupMessage = document.getElementById('signup-message');
    const signupButton = document.getElementById('signup-button');

    function handleSignupClick() {
        if (!signupForm || !signupMessage) {
            return;
        }

        if (!signupForm.reportValidity()) {
            return;
        }

        signupMessage.textContent = 'Sign up is currently unavailable. Please use the Contact page to request access.';
    }

    if (signupButton) {
        signupButton.addEventListener('click', handleSignupClick);
    }

    loadNow(1);
});
</script>
